<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: black;
            color: white;
        }

        button {
            font-size: 30px;
        }
    </style>
</head>

<body>

    <h1 id="text">안녕</h1>

    <button onclick="changeText()">
        눌러봐
    </button>

    <script>
        function changeText() {
            document.getElementById("text").innerHTML = "바뀌었다!";
        }
    </script>

</body>
</html>
